<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Day 1 - Editor de Texto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="options">
            <button id="bold" class="option-btn format">
                <i class="fa fa-bold" aria-hidden="true"></i>
            </button>
            <button id="superscript" class="option-btn script">
                <i class="fa fa-superscript" aria-hidden="true"></i>
            </button>
            <button id="subscript" class="option-btn script">
                <i class="fa fa-subscript" aria-hidden="true"></i>
            </button>
            <button id="insertOrderedList" class="option-btn">
                <i class="fa fa-list-ol" aria-hidden="true"></i>
            </button>
            <button id="insertUnorderedList" class="option-btn">
                <i class="fa fa-list-ul" aria-hidden="true"></i>
            </button>
            <button id="undo" class="option-btn">
                <i class="fa fa-undo" aria-hidden="true"></i>
            </button>
            <button id="redo" class="option-btn">
                <i class="fa fa-repeat" aria-hidden="true"></i>
            </button>
            <button id="create-link" class="cr-option-btn">
                <i class="fa fa-link" aria-hidden="true"></i>
            </button>
            <button id="unlink" class="option-btn">
                <i class="fa fa-chain-broken" aria-hidden="true"></i>
            </button>
            <button id="justifyFull" class="option-btn align">
                <i class="fa fa-align-justify" aria-hidden="true"></i>
            </button>
            <button id="justifyLeft" class="cr-option-btn align">
                <i class="fa fa-align-left" aria-hidden="true"></i>
            </button>
            <button id="justifyCenter" class="option-btn align">
                <i class="fa fa-align-center" aria-hidden="true"></i>
            </button>
            <button id="justifyRight" class="option-btn align">
                <i class="fa fa-align-right" aria-hidden="true"></i>
            </button>
            <button id="indent" class="option-btn spacing">
                <i class="fa fa-indent" aria-hidden="true"></i>
            </button>
            <button id="outdent" class="option-btn spacing">
                <i class="fa fa-outdent" aria-hidden="true"></i>
            </button>

            <select id="formatBlock" class="cr-option-btn">
                <option value="H1">H1</option>
                <option value="H2">H2</option>
                <option value="H3">H3</option>
                <option value="H4">H4</option>
                <option value="H5">H5</option>
                <option value="H6">H6</option>
            </select>
            <select id="fontName" class="cr-option-btn"></select>
            <select id="fontSize" class="cr-option-btn"></select>

            <div class="input-wrapper">
                <input type="color" id="foreColor" class="cr-option-btn">
                <label for="foreColor">Fonte texto</label>
            </div>
            <div class="input-wrapper">
                <input type="color" id="backColor" class="cr-option-btn">
                <label for="backColor">Cor de destaque</label>
            </div>
        </div>
        <div id="text-input" contenteditable="true"></div>
    </div>
    <script src="./js/main.js"></script>
</body>
</html>
